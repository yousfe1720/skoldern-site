    * { margin: 0; padding: 0; box-sizing: border-box; }

      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 2.5rem;
    }

      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 14px 30px;
      font-size: 14px;
      color: #111;
      text-decoration: none;
      background: #fff;
    }
    .email-btn:hover { background: #f5f5f5; }
    footer {
      position: absolute;
      bottom: 2rem;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
    }
